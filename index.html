<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Quantity Planner</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #2d3748; margin-top: 0; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        h3 { color: #4a5568; margin-top: 2rem; font-size: 1.1rem; border-left: 4px solid #cbd5e0; padding-left: 10px; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #4a5568; font-size: 0.85rem; text-transform: uppercase; }
        
        input[type="file"] { width: 100%; padding: 8px; background: white; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        
        .slider-container { background: #ebf8ff; padding: 15px; border-radius: 8px; border: 1px solid #bee3f8; }
        .highlight { color: #2b6cb0; font-size: 1.2rem; font-weight: bold; }

        .summary-bar { display: flex; justify-content: center; background: #2d3748; color: white; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; }
        .stat { font-size: 1.1rem; }
        .stat b { color: #63b3ed; }

        .table-wrapper { overflow-x: auto; margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #edf2f7; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: #4a5568; letter-spacing: 0.05em; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 0.9rem; }
        tr:hover { background: #fcfcfc; }
        
        .low-stock { color: #e53e3e; font-weight: bold; background: #fff5f5; padding: 2px 4px; border-radius: 4px; }
        .qty-box { font-weight: bold; color: #2f855a; background: #f0fff4; padding: 4px 8px; border-radius: 4px; border: 1px solid #c6f6d5; }
        .slow-mover-tag { color: #718096; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Inventory Quantity Planner</h2>
    
    <div class="setup-grid">
        <div>
            <label>1. Upload CSV File</label>
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <div class="slider-container">
            <label>2. Day Goal: <span id="dayVal" class="highlight">60</span> days</label>
            <input type="range" id="days" min="1" max="120" value="60" style="width:100%" oninput="updateSlider(this.value)">
        </div>
    </div>

    <div class="summary-bar">
        <span class="stat">Unique Items Requiring Restock: <b id="totalItems">0</b></span>
    </div>

    <h3>Active Restock List</h3>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Daily AVR</th>
                    <th>Stock</th>
                    <th>Days Left</th>
                    <th>Order Qty</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="5" style="text-align:center; color:#a0aec0; padding: 40px;">Upload your CSV to see calculations...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 style="border-left-color: #f6ad55; color: #dd6b20;">Slow Moving Inventory (90+ Days)</h3>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Daily AVR</th>
                    <th>Current Stock</th>
                    <th>Days of Stock</th>
                </tr>
            </thead>
            <tbody id="slowTableBody">
                <tr>
                    <td colspan="4" style="text-align:center; color:#a0aec0; padding: 20px;">No slow movers detected yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let inventoryData = [];

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            if (!line.trim()) continue;
            const values = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            rows.push(values);
        }
        return rows;
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const rows = parseCSV(event.target.result);
            processData(rows);
        };
        reader.readAsText(file);
    });

    function processData(rows) {
        inventoryData = [];
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (row.length < 12) continue; 

            inventoryData.push({
                name: row[2],                  // Column C
                avr: parseFloat(row[10]) || 0,    // Column K
                stock: parseFloat(row[11]) || 0,  // Column L
                daysLeft: parseInt(row[12]) || 0  // Column M
            });
        }
        calculate();
    }

    function updateSlider(val) {
        document.getElementById('dayVal').innerText = val;
        calculate();
    }

    function calculate() {
        if (inventoryData.length === 0) return;

        const goalDays = parseInt(document.getElementById('days').value);
        const tbody = document.getElementById('tableBody');
        const slowTbody = document.getElementById('slowTableBody');
        
        tbody.innerHTML = '';
        slowTbody.innerHTML = '';

        let totalItemsCount = 0;
        let slowMoversExist = false;

        inventoryData.forEach(item => {
            // Main Calculation
            const rawQty = (item.avr * goalDays) - item.stock;
            const finalQty = Math.max(0, Math.ceil(rawQty));

            if (finalQty > 0) {
                totalItemsCount++;
            }

            // Populate Active List
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b>${item.name}</b></td>
                <td>${item.avr.toFixed(2)}</td>
                <td>${item.stock}</td>
                <td><span class="${item.daysLeft < 7 ? 'low-stock' : ''}">${item.daysLeft} days</span></td>
                <td><span class="qty-box">${finalQty}</span></td>
            `;
            tbody.appendChild(row);

            // Populate Slow Moving List (if Days Left > 90)
            if (item.daysLeft > 90) {
                slowMoversExist = true;
                const slowRow = document.createElement('tr');
                slowRow.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.avr.toFixed(2)}</td>
                    <td>${item.stock}</td>
                    <td class="slow-mover-tag">${item.daysLeft} days</td>
                `;
                slowTbody.appendChild(slowRow);
            }
        });

        if (!slowMoversExist) {
            slowTbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#a0aec0; padding: 20px;">No products with 90+ days of stock found.</td></tr>';
        }

        document.getElementById('totalItems').innerText = totalItemsCount;
    }
</script>

</body>
</html>
