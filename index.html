<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Quantity Planner - Location Edition</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #2d3748; margin-top: 0; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 2rem; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; align-items: end; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #4a5568; font-size: 0.85rem; text-transform: uppercase; }
        select, input[type="file"] { width: 100%; padding: 8px; background: white; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        
        .slider-container { background: #ebf8ff; padding: 15px; border-radius: 8px; border: 1px solid #bee3f8; grid-column: span 3; }
        .highlight { color: #2b6cb0; font-size: 1.2rem; font-weight: bold; }

        .summary-bar { display: flex; justify-content: space-between; align-items: center; background: #2d3748; color: white; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; }
        .stat b { color: #63b3ed; }

        .btn-excel-export { background: #217346; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-excel-export:hover { background: #1a5c38; }

        .section-header { display: flex; justify-content: space-between; align-items: center; background: #edf2f7; padding: 12px 15px; margin-top: 2rem; border-radius: 8px; cursor: pointer; border-left: 4px solid #cbd5e0; }
        .section-header h3 { margin: 0; font-size: 1.1rem; color: #4a5568; }
        .toggle-icon::before { content: '▼'; font-size: 0.8rem; color: #718096; }
        .collapsed .toggle-icon::before { content: '▶'; }
        .is-hidden { display: none; }

        .table-wrapper { overflow-x: auto; margin-top: 10px; border: 1px solid #edf2f7; border-radius: 4px; max-height: 600px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th { position: sticky; top: 0; text-align: left; background: #f8fafc; padding: 12px; font-size: 0.7rem; text-transform: uppercase; color: #4a5568; border-bottom: 2px solid #edf2f7; z-index: 5; cursor: pointer; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 0.85rem; }
        
        .sku-cell { font-family: monospace; color: #718096; font-size: 0.8rem; }
        .loc-cell { color: #4a5568; font-weight: 600; font-size: 0.8rem; }
        .qty-box { font-weight: bold; color: #2f855a; background: #f0fff4; padding: 4px 8px; border-radius: 4px; border: 1px solid #c6f6d5; }
    </style>
</head>
<body>

<div class="container">
    <h2>Inventory Quantity Planner</h2>
    
    <div class="setup-grid">
        <div>
            <label>1. Upload Master CSV</label>
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <div>
            <label>2. Isolate Location</label>
            <select id="locationFilter" onchange="calculate()">
                <option value="ALL">All Locations</option>
            </select>
        </div>
        <div>
            <label>3. Filter Category</label>
            <select id="categoryFilter" onchange="calculate()">
                <option value="ALL">All Categories</option>
            </select>
        </div>
        <div class="slider-container">
            <label>4. Day Goal: <span id="dayVal" class="highlight">60</span> days</label>
            <input type="range" id="days" min="1" max="120" value="60" style="width:100%" oninput="updateSlider(this.value)">
        </div>
    </div>

    <div class="summary-bar">
        <span class="stat">Restock Items in Current View: <b id="totalItems">0</b></span>
        <button class="btn-excel-export" onclick="exportToExcel()">⬇ Export Multi-Tab Excel (.xlsx)</button>
    </div>

    <div class="section-header" onclick="toggleSection('reorderContent')">
        <h3>Active Restock List</h3>
        <span class="toggle-icon"></span>
    </div>
    <div id="reorderContent" class="collapsible-content">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th onclick="resort('loc')">Location</th>
                        <th onclick="resort('name')">Product</th>
                        <th onclick="resort('sku')">SKU</th>
                        <th onclick="resort('cost')">Unit Cost</th>
                        <th onclick="resort('avr')">Daily AVR</th>
                        <th onclick="resort('stock')">Stock</th>
                        <th onclick="resort('daysLeft')">Days Left</th>
                        <th onclick="resort('orderQty')">Order Qty</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section-header" style="border-left-color: #f6ad55;" onclick="toggleSection('slowContent')">
        <h3 style="color: #dd6b20;">Slow Moving Inventory (90+ Days)</h3>
        <span class="toggle-icon"></span>
    </div>
    <div id="slowContent" class="collapsible-content">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th onclick="resort('loc')">Location</th>
                        <th onclick="resort('name')">Product</th>
                        <th onclick="resort('sku')">SKU</th>
                        <th onclick="resort('cost')">Unit Cost</th>
                        <th onclick="resort('avr')">Daily AVR</th>
                        <th onclick="resort('stock')">Current Stock</th>
                        <th onclick="resort('daysLeft')">Days Left</th>
                    </tr>
                </thead>
                <tbody id="slowTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    let inventoryData = [];
    let sortState = { key: 'name', asc: true };

    function toggleSection(id) {
        const content = document.getElementById(id);
        content.classList.toggle('is-hidden');
        content.previousElementSibling.classList.toggle('collapsed');
    }

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            if (!line.trim()) continue;
            const values = []; let current = '', inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                else current += char;
            }
            values.push(current.trim()); rows.push(values);
        }
        return rows;
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const rows = parseCSV(event.target.result);
            const categories = new Set();
            const locations = new Set();
            
            // Stable mapping logic from original working version
            inventoryData = rows.slice(1).filter(r => r.length >= 12).map(r => {
                locations.add(r[0]); 
                categories.add(r[5]); 
                return {
                    loc: r[0], category: r[5], name: r[2], sku: r[3],                
                    cost: parseFloat(r[8]) || 0, avr: parseFloat(r[10]) || 0, 
                    stock: parseFloat(r[11]) || 0, daysLeft: parseInt(r[12]) || 0 
                };
            });

            const locSelect = document.getElementById('locationFilter');
            locSelect.innerHTML = '<option value="ALL">All Locations</option>';
            Array.from(locations).sort().forEach(loc => { if(loc) locSelect.innerHTML += `<option value="${loc}">${loc}</option>`; });

            const catSelect = document.getElementById('categoryFilter');
            catSelect.innerHTML = '<option value="ALL">All Categories</option>';
            Array.from(categories).sort().forEach(cat => { if(cat) catSelect.innerHTML += `<option value="${cat}">${cat}</option>`; });

            calculate();
        };
        reader.readAsText(e.target.files[0]);
    });

    function updateSlider(val) {
        document.getElementById('dayVal').innerText = val;
        calculate();
    }

    function resort(key) {
        sortState.asc = (sortState.key === key) ? !sortState.asc : true;
        sortState.key = key;
        calculate();
    }

    function calculate() {
        if (!inventoryData.length) return;
        const goalDays = parseInt(document.getElementById('days').value);
        const filterLoc = document.getElementById('locationFilter').value;
        const filterCat = document.getElementById('categoryFilter').value;
        
        let filtered = inventoryData.filter(item => (filterLoc === 'ALL' || item.loc === filterLoc) && (filterCat === 'ALL' || item.category === filterCat));

        filtered.sort((a, b) => {
            let valA = a[sortState.key], valB = b[sortState.key];
            if (sortState.key === 'orderQty') {
                valA = (a.avr * goalDays) - a.stock; valB = (b.avr * goalDays) - b.stock;
            }
            if (typeof valA === 'string') return sortState.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            return sortState.asc ? valA - valB : valB - valA;
        });

        const tbody = document.getElementById('tableBody');
        const slowTbody = document.getElementById('slowTableBody');
        let restockCount = 0;
        let restockHtml = '';
        let slowHtml = '';

        filtered.forEach(item => {
            const orderQty = Math.max(0, Math.ceil((item.avr * goalDays) - item.stock));
            if (orderQty > 0) {
                restockCount++;
                restockHtml += `<tr><td class="loc-cell">${item.loc}</td><td><b>${item.name}</b></td><td class="sku-cell">${item.sku}</td><td>$${item.cost.toFixed(2)}</td><td>${item.avr.toFixed(2)}</td><td>${item.stock}</td><td>${item.daysLeft} days</td><td><span class="qty-box">${orderQty}</span></td></tr>`;
            }
            if (item.daysLeft > 90) {
                slowHtml += `<tr><td class="loc-cell">${item.loc}</td><td>${item.name}</td><td class="sku-cell">${item.sku}</td><td>$${item.cost.toFixed(2)}</td><td>${item.avr.toFixed(2)}</td><td>${item.stock}</td><td>${item.daysLeft} days</td></tr>`;
            }
        });

        tbody.innerHTML = restockHtml || '<tr><td colspan="8" style="text-align:center; padding:20px;">No items need restocking.</td></tr>';
        slowTbody.innerHTML = slowHtml || '<tr><td colspan="7" style="text-align:center; padding:20px;">No slow movers found.</td></tr>';
        document.getElementById('totalItems').innerText = restockCount;
    }

    function exportToExcel() {
        if (!inventoryData.length) return alert("Please upload data first.");
        const goalDays = parseInt(document.getElementById('days').value);
        const filterLoc = document.getElementById('locationFilter').value;
        const filterCat = document.getElementById('categoryFilter').value;
        
        let filtered = inventoryData.filter(item => (filterLoc === 'ALL' || item.loc === filterLoc) && (filterCat === 'ALL' || item.category === filterCat));

        const restockRows = [["Location", "Product", "SKU", "Unit Cost", "Daily AVR", "Stock", "Days Left", "Order Qty"]];
        filtered.forEach(item => {
            const orderQty = Math.max(0, Math.ceil((item.avr * goalDays) - item.stock));
            if (orderQty > 0) {
                restockRows.push([item.loc, item.name, item.sku, item.cost, item.avr, item.stock, item.daysLeft, orderQty]);
            }
        });

        const slowRows = [["Location", "Product", "SKU", "Unit Cost", "Daily AVR", "Current Stock", "Days Left"]];
        filtered.forEach(item => {
            if (item.daysLeft > 90) {
                slowRows.push([item.loc, item.name, item.sku, item.cost, item.avr, item.stock, item.daysLeft]);
            }
        });

        const wb = XLSX.utils.book_new();
        const wsRestock = XLSX.utils.aoa_to_sheet(restockRows);
        const wsSlow = XLSX.utils.aoa_to_sheet(slowRows);

        XLSX.utils.book_append_sheet(wb, wsRestock, "Active Restock");
        XLSX.utils.book_append_sheet(wb, wsSlow, "Slow Moving");

        XLSX.writeFile(wb, `Inventory_Planner_Report_${filterLoc}.xlsx`);
    }
</script>
</body>
</html>
